name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Run coverage
        run: pytest --cov=knowcran --cov-report=term-missing

      - name: Compile sources
        run: python -m compileall knowcran tests

  package:
    name: Build package & Smoke check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package metadata with twine
        run: twine check dist/*

      - name: Install package with local dependencies
        run: pip install -e ".[local]"

      - name: Verify CLI commands
        run: |
          knowcran --help
          knowcran doctor

      - name: Local services CLI & health probe smoke check
        shell: bash
        run: |
          knowcran embedding-server --host 127.0.0.1 --port 8020 --device cpu --model all-MiniLM-L6-v2 &
          SERVER_PID=$!
          echo "Waiting for local embedding-server (PID: $SERVER_PID) to respond..."
          
          SUCCESS=false
          for i in {1..30}; do
            if curl -s -f http://127.0.0.1:8020/health > /dev/null; then
              echo "Server health check passed!"
              SUCCESS=true
              break
            fi
            sleep 1
          done
          
          kill $SERVER_PID
          
          if [ "$SUCCESS" = false ]; then
            echo "Local embedding-server failed health probe!"
            exit 1
          fi
