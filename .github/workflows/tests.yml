name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Run coverage
        run: pytest --cov=knowcran --cov-report=term-missing

      - name: Compile sources
        run: python -m compileall knowcran tests

  package:
    name: Build package & Smoke check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package metadata with twine
        run: twine check dist/*

      - name: Install package
        run: pip install -e .

      - name: Verify CLI commands
        run: |
          knowcran --help
          knowcran doctor

      - name: Verify local service modules import without model downloads
        run: |
          python -c "from knowcran.services.manager import probe_embedding_health, probe_mineru_health; print(probe_embedding_health, probe_mineru_health)"
